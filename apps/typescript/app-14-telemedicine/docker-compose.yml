services:
  web:
    build: .
    ports:
      - "8014:8014"
    environment:
      PORT: "8014"
      JWT_SECRET: healthcare123
      DATABASE_URL: postgres://telemed:telemedpass@postgres:5432/telemeddb
      REDIS_URL: redis://redis:6379/14
      KAFKA_BROKERS: kafka:9092
      PATIENT_SEARCH_URL: http://elasticsearch:9200
      MONGO_URI: mongodb://mongodb:27017/telemed_clinical
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:8014/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    environment:
      POSTGRES_DB: telemeddb
      POSTGRES_USER: telemed
      POSTGRES_PASSWORD: telemedpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemed -d telemeddb"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: public.ecr.aws/bitnami/kafka:3.7.0
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_KRAFT_CLUSTER_ID: abcdefghijklmnopqrstuv
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_HEAP_OPTS: -Xmx256m -Xms256m
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  mongodb:
    image: public.ecr.aws/docker/library/mongo:6
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 10

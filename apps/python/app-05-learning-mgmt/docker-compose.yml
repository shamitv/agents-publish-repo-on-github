services:
  web:
    build: .
    ports:
      - "8085:8085"
    environment:
      DATABASE_URL: postgresql://lms:lms@db:5432/lms
      MONGO_URI: mongodb://mongodb:27017/lms
      KAFKA_BROKER: kafka:9092
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:6
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka:
    image: redpandadata/redpanda:v24.1.9
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Airlines — Register Account</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="app-container" style="max-width: 600px;">
        <div class="glass-card">
            <header style="text-align: center; margin-bottom: 32px;">
                <div style="font-size: 28px; font-weight: 700; color: var(--primary); letter-spacing: 2px; text-transform: uppercase;">
                    ✈ Apex Airlines
                </div>
                <p style="color: var(--text-muted); margin-top: 8px;">Create Passenger Profile Account</p>
            </header>

            <div th:if="${error}" class="glass-card" style="padding: 16px; margin-bottom: 20px; border-color: var(--danger); text-align: center;">
                <span style="color: var(--danger); font-weight: 600;" th:text="${error}">Error details</span>
            </div>

            <form th:action="@{/register}" method="POST">
                <div class="grid-2" style="gap: 16px;">
                    <div class="form-group">
                        <label class="form-label" for="regFirstName">First Name</label>
                        <input type="text" id="regFirstName" name="firstName" class="form-input" placeholder="e.g. John" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="regLastName">Last Name</label>
                        <input type="text" id="regLastName" name="lastName" class="form-input" placeholder="e.g. Doe" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" name="email" class="form-input" placeholder="e.g. john@gmail.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regPassword">Account Password</label>
                    <input type="password" id="regPassword" name="password" class="form-input" placeholder="Min 6 characters" required>
                </div>

                <div class="grid-2" style="gap: 16px;">
                    <div class="form-group">
                        <label class="form-label" for="regPassport">Passport Number</label>
                        <input type="text" id="regPassport" name="passportNumber" class="form-input" placeholder="e.g. US123456">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="regPhone">Phone Number</label>
                        <input type="text" id="regPhone" name="phone" class="form-input" placeholder="e.g. +1-555-0101">
                    </div>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 24px;">Create Passenger Profile</button>
            </form>

            <div style="margin-top: 24px; text-align: center; font-size: 14px;">
                <p style="color: var(--text-muted);">
                    Already have an account? 
                    <a th:href="@{/}" style="color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 4px;">Login Here</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>

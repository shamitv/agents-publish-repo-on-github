<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Management — Organization Chart</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .org-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            margin: 12px;
            min-width: 180px;
            border-radius: 8px;
            text-align: center;
        }
        .org-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-top: 24px;
        }
        .org-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <span>Enterprise HR</span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li class="nav-item">
                        <a th:href="@{/dashboard}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/employees}">Employees</a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/payroll}">Payroll</a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/leave}">Leave Requests</a>
                    </li>
                    <li class="nav-item active">
                        <a th:href="@{/org-chart}">Org Chart</a>
                    </li>
                </ul>
            </nav>

            <div class="user-profile-badge">
                <div class="user-avatar" th:text="${#strings.substring(currentUser.firstName,0,1)}">U</div>
                <div class="user-info">
                    <span class="user-name" th:text="${currentUser.firstName + ' ' + currentUser.lastName}">User Name</span>
                    <span class="user-role" th:text="${currentUser.role}">Role</span>
                </div>
                <a th:href="@{/logout}" style="margin-left: auto; color: var(--danger); font-size: 13px; text-decoration: none;">Logout</a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="page-header">
                <div class="page-title">
                    <h1>Organization Chart</h1>
                    <p>Hierarchical view of company roles and reporting structure</p>
                </div>
            </header>

            <div class="glass" style="padding: 40px; min-height: 400px; display: flex; justify-content: center;">
                <div class="org-container" id="orgContainer">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetch("/api/employees")
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById("orgContainer");
                    
                    // Group employees by role to construct a simple hierarchy for visualization
                    const admins = data.filter(e => e.role === "HR_ADMIN");
                    const managers = data.filter(e => e.role === "MANAGER");
                    const employees = data.filter(e => e.role === "EMPLOYEE");

                    let html = `<div class="org-row">`;
                    admins.forEach(admin => {
                        html += `
                            <div class="org-node glass" style="border-color: var(--primary);">
                                <span style="font-weight: 700; color: var(--primary);">${admin.firstName} ${admin.lastName}</span>
                                <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">${admin.role}</span>
                                <span style="font-size: 12px; margin-top: 2px;">${admin.departmentName}</span>
                            </div>
                        `;
                    });
                    html += `</div><div style="width: 2px; height: 24px; background: var(--card-border);"></div><div class="org-row">`;
                    
                    managers.forEach(mgr => {
                        html += `
                            <div class="org-node glass" style="border-color: var(--warning);">
                                <span style="font-weight: 700; color: var(--warning);">${mgr.firstName} ${mgr.lastName}</span>
                                <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">${mgr.role}</span>
                                <span style="font-size: 12px; margin-top: 2px;">${mgr.departmentName}</span>
                            </div>
                        `;
                    });
                    
                    html += `</div><div style="width: 2px; height: 24px; background: var(--card-border);"></div><div class="org-row">`;
                    
                    employees.forEach(emp => {
                        html += `
                            <div class="org-node glass">
                                <span style="font-weight: 600;">${emp.firstName} ${emp.lastName}</span>
                                <span style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">${emp.role}</span>
                                <span style="font-size: 12px; margin-top: 2px;">${emp.departmentName}</span>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    
                    container.innerHTML = html;
                })
                .catch(err => console.error("Error loading org chart", err));
        });
    </script>
</body>
</html>

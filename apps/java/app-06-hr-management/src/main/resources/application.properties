server.port=8080
spring.application.name=app-06-hr-management

# Data source configurations
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:hrdb;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# JPA & Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Thymeleaf cache disable for development ease
spring.thymeleaf.cache=false

# Event and search integrations
app.kafka.enabled=${APP_KAFKA_ENABLED:false}
app.kafka.audit-topic=${APP_KAFKA_AUDIT_TOPIC:hr-payroll-audit}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:hr-audit-consumers}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.hr.events
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
app.elasticsearch.url=${APP_ELASTICSEARCH_URL:http://localhost:9200}
app.elasticsearch.enabled=${APP_ELASTICSEARCH_ENABLED:false}

# Logging properties
logging.level.org.springframework.security=INFO
logging.level.com.hr=DEBUG
